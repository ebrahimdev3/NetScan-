<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetScan - Concurrent URL Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Smooth Animated Gradient Background */
        .gradient-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #0f172a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">

    <header class="border-b border-slate-800/60 backdrop-blur-md sticky top-0 z-50 bg-slate-900/50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-shield-halved text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">NetScan Pro</h1>
                    <p class="text-xs text-indigo-400 font-medium">Concurrent Multi-URL Scanner</p>
                </div>
            </div>
            <div class="flex items-center gap-2 text-xs bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700/50 text-slate-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Cloud API Active
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 flex-grow w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 bg-slate-900/40 border border-slate-800/80 rounded-2xl p-6 backdrop-blur-xl flex flex-col gap-4 h-fit">
            <div class="flex items-center gap-2 mb-2">
                <i class="fa-solid fa-list-check text-indigo-400 text-lg"></i>
                <h2 class="text-lg font-bold text-white">Target URLs</h2>
            </div>
            <p class="text-xs text-slate-400 leading-relaxed">
                Enter the URLs you want to scan simultaneously. Place each URL on a separate line.
            </p>
            <textarea id="urlInput" rows="8" 
                class="w-full bg-slate-950/60 border border-slate-800 focus:border-indigo-500/80 focus:ring-2 focus:ring-indigo-500/20 rounded-xl p-4 text-sm text-slate-200 outline-none transition placeholder-slate-700 font-mono resize-none"
                placeholder="google.com&#10;github.com&#10;mysite.xyz"></textarea>
            
            <button onclick="startConcurrentScan()" id="btnScan"
                class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition flex items-center justify-center gap-2 group">
                <i class="fa-solid fa-bolt transition group-hover:scale-110"></i>
                <span>Launch Concurrent Scan</span>
            </button>
        </div>

        <div class="lg:col-span-2 bg-slate-900/40 border border-slate-800/80 rounded-2xl p-6 backdrop-blur-xl flex flex-col min-h-[400px]">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-square-poll-horizontal text-indigo-400 text-lg"></i>
                    <h2 class="text-lg font-bold text-white">Live Dashboard</h2>
                </div>
                <div id="scanCounter" class="text-xs text-slate
